# Production stack — LAN-only deployment with rolling backups and
# restart-on-boot. Secrets live in .env.prod (never committed); run everything
# through the wrapper so the right env file is picked up:
#
#   ./deploy/prod.sh up -d --build      # build + start
#   ./deploy/prod.sh logs -f server     # follow relay logs
#   ./deploy/prod.sh down               # stop (volumes/data survive)
#
# See deploy/README.md for the full runbook (backups, restore, TLS).
name: mneme-prod

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: journal
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env.prod}
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        # Stamped into the binary as the build version. deploy/prod.sh exports
        # MNEME_VERSION=$(git describe --tags --always); falls back to "dev".
        VERSION: "${MNEME_VERSION:-dev}"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://journal:${POSTGRES_PASSWORD}@postgres:5432/journal?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: journal-media
      LISTEN_ADDR: ":8080"
      # Everything is same-origin behind Caddy — no cross-origin callers exist.
      CORS_ORIGINS: ""
      # Operator dashboard at /admin; unset to disable it entirely.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # Gate new vaults behind operator approval (needs ADMIN_TOKEN to approve).
      # Default off = open relay. Set true for a single-tenant / hand-picked relay.
      REQUIRE_APPROVAL: ${REQUIRE_APPROVAL:-false}
      # Dashboard update check (GitHub releases); set off for air-gapped hosts.
      UPDATE_CHECK: ${UPDATE_CHECK:-on}
      # Rolling encrypted-blob archives of every vault (see deploy/README.md).
      BACKUP_DIR: /backups
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
    volumes:
      # Bind mount on the host so archives are trivial to copy off-box.
      - ${BACKUP_HOST_DIR:?set in .env.prod}:/backups
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }

  web:
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set in .env.prod}
      # Served to clients that connect by bare IP (no SNI in the handshake).
      DEFAULT_SNI: ${DEFAULT_SNI:?set in .env.prod}
    ports:
      - "80:80" # redirects to https
      - "443:443"
    volumes:
      - caddy_data:/data # internal CA + issued certs persist here
      - caddy_config:/config
    depends_on: [server]

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
